name: GBP/USD Triple EMA Momentum Bot v3.1

on:
  schedule:
    # Every 5 minutes, Mon-Fri, full day UTC
    # Focused on London Open window: 06:00-08:00 UTC
    # But cron runs all day so state resets correctly at UTC midnight
    - cron: "*/5 6-8 * * 1-5"    # Mon-Fri 06:00-08:59 UTC  (London Open — main entry window)
    - cron: "0 0 * * 1-5"        # Mon-Fri 00:00 UTC         (daily state reset)

  workflow_dispatch:              # Manual trigger anytime

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.run_number }}
          restore-keys: |
            bot-state-

      - name: Run bot
        env:
          OANDA_API_KEY:    ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: |
            *.log
            bot_state.json
          retention-days: 14
