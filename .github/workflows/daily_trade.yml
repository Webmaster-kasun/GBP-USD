name: GBP/USD Triple EMA Momentum Bot — Demo

on:
  schedule:
    - cron: "*/5 * * * 1-5"    # every 5 min, Mon-Fri, all day
    - cron: "0 0 * * 1-5"      # daily state reset at 00:00 UTC
  workflow_dispatch:            # manual trigger anytime

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.run_number }}
          restore-keys: |
            bot-state-

      - name: Run bot
        env:
          OANDA_API_KEY:    ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: |
            *.log
            bot_state.json
          retention-days: 14
